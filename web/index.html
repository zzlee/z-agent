<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z-Agent | LLM Tool-Use Relay</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo" style="font-size: 1.15rem;">Z-Agent <span>Relay</span></h1>
        <button id="btnNewSession" class="btn-new-session">+ 新會話</button>
      </div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="main-area">
      <header class="main-header">
        <div>
          <h2 id="currentSessionName">選擇一個會話或建立新會話</h2>
          <span id="currentWorkspacePath" class="workspace-path hidden"></span>
        </div>
      </header>

      <div class="relay-layout">
        <section class="relay-flow">
          <!-- 提示詞輸出 -->
          <div id="promptCard" class="card hidden">
            <div class="card-title">
              <span>📋 提示詞 — 複製給 LLM</span>
              <span id="tokenBadge" class="badge-tokens">0 Tokens</span>
            </div>
            <div class="prompt-tabs" style="display: flex; gap: 6px; margin-bottom: 4px;">
              <button id="btnPromptTabFull" class="btn-secondary" style="flex: 1; padding: 6px; font-size: 0.75rem;">完整提示詞</button>
              <button id="btnPromptTabLatest" class="btn-secondary" style="flex: 1; padding: 6px; font-size: 0.75rem;">僅最新內容</button>
            </div>
            <textarea id="promptTextarea" class="prompt-textarea" readonly></textarea>
            <button id="btnCopyPrompt" class="btn-primary">📋 複製</button>
          </div>

          <!-- LLM 回應輸入 -->
          <div id="responseCard" class="card hidden">
            <div class="card-title">🤖 LLM 回應</div>
            <textarea id="responseTextarea" class="prompt-textarea" placeholder="貼上 LLM 回應（包含 &lt;tool_call&gt; 標記）..."></textarea>
            <button id="btnSubmitResponse" class="btn-primary">▶ 提交</button>
          </div>

          <!-- 工具執行結果 -->
          <div id="toolResultCard" class="card hidden">
            <div class="card-title">📤 執行結果 — 複製回 LLM</div>
            <textarea id="toolResultTextarea" class="prompt-textarea" style="height: 120px;" readonly></textarea>
            <button id="btnCopyToolResult" class="btn-primary">📋 複製</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <footer class="status-bar">
    <div class="status-left">
      <span class="status-indicator">
        <span id="connectionDot" class="dot"></span>
        <span id="connectionText">連線中...</span>
      </span>
      <span class="status-indicator">
        <span id="phaseDot" class="dot"></span>
        <span id="phaseText">閒置</span>
      </span>
    </div>
    <div class="status-right">
      <span id="statusOs">-</span>
      <span>會話: <strong id="statusSessionId">-</strong></span>
    </div>
  </footer>

  <div id="newSessionModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>建立新會話</h3>
      <div class="form-group">
        <label for="inputSessionName">會話名稱（選填）</label>
        <input type="text" id="inputSessionName" class="form-control" placeholder="例如：建立 Express 伺服器">
      </div>
      <div class="form-group">
        <label for="inputSessionCwd">工作目錄路徑</label>
        <input type="text" id="inputSessionCwd" class="form-control" value="./workspace">
      </div>
      <div class="modal-actions">
        <button id="btnCancelModal" class="btn-secondary">取消</button>
        <button id="btnConfirmModal" class="btn-primary">建立</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
